[phases.setup]
nixPkgs = ["nodejs_22", "php82", "php82Extensions.mbstring", "php82Extensions.pdo_mysql", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.tokenizer", "php82Extensions.ctype", "php82Extensions.fileinfo", "phpPackages.composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install"]

[phases.build]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan migrate --force && php -S 0.0.0.0:$PORT -t public"
